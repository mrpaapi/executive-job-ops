<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset=".45" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="case" x1="12" y1="20" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".75"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fde68a" stop-opacity=".9"/>
      <stop offset="1" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded gradient tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- soft glow behind briefcase -->
  <circle cx="32" cy="36" r="22" fill="url(#glow)"/>

  <!-- briefcase body -->
  <rect x="12" y="22" width="40" height="28" rx="5" fill="url(#case)"/>
  <rect x="12" y="22" width="40" height="28" rx="5" stroke="#1e1b4b" stroke-width="1.5" stroke-opacity=".25"/>

  <!-- briefcase handle -->
  <path d="M24 22v-3a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v3"
        stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- clasp line -->
  <line x1="12" y1="32" x2="52" y2="32" stroke="#1e1b4b" stroke-width="1.2" stroke-opacity=".2"/>
  <rect x="29" y="30" width="6" height="4" rx="1" fill="#6366f1"/>

  <!-- AI sparkles -->
  <path d="M46 14l1.3 3.2L50.5 18.5l-3.2 1.3L46 23l-1.3-3.2L41.5 18.5l3.2-1.3z" fill="#fde68a"/>
  <path d="M16 10l.8 2 2 .8-2 .8L16 15.6l-.8-2-2-.8 2-.8z" fill="#fbbf24"/>
  <circle cx="52" cy="46" r="1.6" fill="#fde68a"/>
</svg>
