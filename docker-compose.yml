version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./resumes:/app/resumes
      - db_data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - RESUME_FOLDER=/app/resumes
      - DATABASE_URL=sqlite+aiosqlite:////app/data/executive_job_ops.db
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-llama3}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
